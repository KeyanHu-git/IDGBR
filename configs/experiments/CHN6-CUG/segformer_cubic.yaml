# ==============================================================================
# Inheritance
# ==============================================================================
_base_: "../../base_config.yaml"

# ==============================================================================
# 1. Experiment Identity & Paths
# ==============================================================================
output_dir: "../../../experiments/CHN6-CUG/segformer_cubic_001"
pretrained_model_name_or_path: "../../../weight/stable-diffusion-v1-5"
sd_model_name_or_path: "../../../weight/stable-diffusion-v1-5"
label_embed_dir: "../../../weight/labelembednet2"
encoder_path: "../../../weight/DINOv2/dinov2_vit_g14.pth"

# ==============================================================================
# 2. Dataset & Task Configuration
# ==============================================================================
train_data_dir: "../../../examples/CHN6-CUG"
metadata_file: "metadata_i2s_segformer_train.jsonl"                            # JSONL index file name in data dir
dataset: "../../datasets/CHN6-CUG/train.yaml"

# ==============================================================================
# 3. Training Dynamics
# ==============================================================================
train_batch_size: 4
max_train_steps: 80000
checkpointing_steps: 40000                                             # Save state every N steps
acc_steps: 200                                                        # Alignment warmup steps
enable_alignment: true

# ==============================================================================
# 4. Strategies
# ==============================================================================
time_sample_strategy: true                                            # Enable cubic time-step sampling
